<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>じゃんけんルーム</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-live="polite">
      <section id="lobby" class="lobby">
        <div class="brand">
          <span class="brand-mark">✊</span>
          <div>
            <h1>じゃんけんルーム</h1>
            <p>ルームを作って、みんなで同時に手を出そう。</p>
          </div>
        </div>

        <div class="join-box">
          <label for="nameInput">あなたの名前</label>
          <input id="nameInput" type="text" maxlength="16" placeholder="例: ゆうき" />
          <label for="targetCountInput">何人で実施する</label>
          <select id="targetCountInput">
            <option value="2">2人</option>
            <option value="3">3人</option>
            <option value="4">4人</option>
            <option value="5">5人</option>
            <option value="6">6人</option>
          </select>
          <div class="join-actions">
            <button id="createRoomButton" class="primary" type="button">ルーム作成</button>
            <button id="joinRoomButton" class="secondary" type="button">参加</button>
          </div>
          <label for="roomInput">ルームコード</label>
          <input id="roomInput" type="text" maxlength="8" placeholder="例: A7K2Q9" />
          <p id="lobbyMessage" class="lobby-message"></p>
        </div>
      </section>

      <section id="room" class="room hidden">
        <header class="room-header">
          <div>
            <span class="label">ルーム</span>
            <strong id="roomCode">------</strong>
            <span id="syncStatus" class="sync-status">ローカル</span>
          </div>
          <div id="roomMeta" class="room-meta"></div>
          <button id="leaveButton" class="ghost" type="button">退出</button>
        </header>

        <section class="share-panel" aria-label="ルーム共有">
          <canvas id="qrCanvas" width="132" height="132" aria-label="共有コード"></canvas>
          <div>
            <span class="label">共有</span>
            <a id="shareLink" class="share-link" href=""></a>
            <p class="share-note">QRはルームコードを読み取れます。</p>
            <button id="copyButton" class="secondary small" type="button">コピー</button>
          </div>
        </section>

        <section class="call-stage" aria-label="結果">
          <div id="callText" class="call-text">待機中</div>
          <div id="roundMessage" class="round-message">2人以上集まったら始められます。</div>
        </section>

        <section id="players" class="players" aria-label="参加者"></section>

        <section class="history-panel" aria-label="履歴">
          <div>
            <span class="label">履歴</span>
            <strong id="historyTitle">まだ結果はありません</strong>
          </div>
          <ol id="historyList" class="history-list"></ol>
        </section>

        <section class="my-panel" aria-label="自分の手">
          <div>
            <span class="label">あなたの手</span>
            <strong id="myStatus">未選択</strong>
          </div>
          <div class="controls">
            <button type="button" class="choice" data-hand="rock">
              <span>グー</span>
              <strong>✊</strong>
            </button>
            <button type="button" class="choice" data-hand="scissors">
              <span>チョキ</span>
              <strong>✌</strong>
            </button>
            <button type="button" class="choice" data-hand="paper">
              <span>パー</span>
              <strong>✋</strong>
            </button>
          </div>
        </section>

        <div class="actions">
          <button id="nextButton" class="secondary" type="button">次の勝負</button>
          <button id="resetButton" class="ghost" type="button">スコアリセット</button>
        </div>
      </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
